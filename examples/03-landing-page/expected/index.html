<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SnapMatte · 把截图修得像样,只要 1 秒</title>
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-fg: #fafafa;
      --color-fg-muted: #a3a3a3;
      --color-accent: #4ade80;
      --color-border: #262626;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --font-heading: Geist, Helvetica, Arial, "Noto Sans SC", sans-serif;
      --font-body: Geist, Helvetica, Arial, "Noto Sans SC", sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--color-bg);
      color: var(--color-fg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.625;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: var(--space-16) var(--space-6);
    }
    .hero {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-12);
      align-items: center;
    }
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; gap: var(--space-8); }
    }
    h1 {
      font-family: var(--font-heading);
      font-size: clamp(40px, 6vw, 72px);
      line-height: 1.1;
      font-weight: 700;
      margin: 0 0 var(--space-6);
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--color-fg-muted);
      font-size: 18px;
      max-width: 56ch;
      margin: 0 0 var(--space-8);
    }
    .ctas { display: flex; gap: var(--space-4); flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: var(--radius-md);
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 150ms var(--ease), background 150ms var(--ease);
    }
    .btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
    .btn-primary {
      background: var(--color-accent);
      color: #0a0a0a;
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-secondary {
      background: transparent;
      color: var(--color-fg);
      border-color: var(--color-border);
    }
    .btn-secondary:hover { border-color: var(--color-fg-muted); }
    .preview {
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      display: grid;
      place-items: center;
      color: var(--color-fg-muted);
      font-family: var(--font-heading);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div>
        <h1>把截图修得像样,只要 1 秒</h1>
        <p class="sub">拖图进来,SnapMatte 自动加留白与水印。配色跟着你的截图走。</p>
        <div class="ctas">
          <a class="btn btn-primary" href="#">免费截一张试试</a>
          <a class="btn btn-secondary" href="#">看 30 秒 demo</a>
        </div>
      </div>
      <div class="preview" aria-label="截图预览占位">[ preview ]</div>
    </section>
  </main>
</body>
</html>
